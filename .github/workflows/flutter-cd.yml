name: Flutter CD

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  staging-deployment:
    runs-on: ubuntu-latest
    environment: staging
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.0'
        
    - name: Get dependencies
      run: flutter pub get
      
    - name: Build Android APK (Staging)
      run: flutter build apk --release --flavor staging
      
    - name: Build iOS IPA (Staging)
      run: flutter build ipa --release --flavor staging
      if: runner.os == 'macOS'
      
    - name: Upload to Firebase App Distribution
      uses: wzieba/Firebase-Distribution-Github-Action@v1
      with:
        appId: ${{secrets.FIREBASE_APP_ID_STAGING}}
        token: ${{secrets.FIREBASE_TOKEN}}
        groups: testers
        file: build/app/outputs/flutter-apk/app-staging-release.apk
        
    - name: Upload artifacts
      uses: actions/upload-artifact@v3
      with:
        name: staging-builds
        path: |
          build/app/outputs/flutter-apk/*.apk
          build/ios/ipa/*.ipa
        retention-days: 30
        
  production-deployment:
    runs-on: ubuntu-latest
    needs: staging-deployment
    environment: production
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.0'
        
    - name: Get dependencies
      run: flutter pub get
      
    - name: Build Android APK (Production)
      run: flutter build apk --release --flavor production --split-per-abi
      
    - name: Build iOS IPA (Production)
      run: flutter build ipa --release --flavor production
      if: runner.os == 'macOS'
      
    - name: Upload to Play Store
      uses: r0adkll/upload-google-play@v1
      with:
        serviceAccountJsonPlainText: ${{secrets.PLAY_STORE_SERVICE_ACCOUNT}}
        packageName: com.vottery.app
        releaseFiles: build/app/outputs/flutter-apk/*.apk
        track: production
        status: completed
        
    - name: Upload to App Store
      uses: apple-actions/upload-testflight-build@v1
      if: runner.os == 'macOS'
      with:
        app-path: build/ios/ipa/*.ipa
        issuer-id: ${{secrets.APP_STORE_ISSUER_ID}}
        api-key-id: ${{secrets.APP_STORE_API_KEY_ID}}
        api-private-key: ${{secrets.APP_STORE_API_PRIVATE_KEY}}
