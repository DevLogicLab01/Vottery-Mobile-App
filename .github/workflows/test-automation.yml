name: Test Automation

on:
  push:
    branches: [ main, develop ]
    paths-ignore:
      - 'rn-app/**'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - 'rn-app/**'

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.0'
        
    - name: Get dependencies
      run: flutter pub get
      
    - name: Run unit tests
      run: flutter test test/unit --coverage
      
  widget-tests:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.0'
        
    - name: Get dependencies
      run: flutter pub get
      
    - name: Run widget tests
      run: flutter test test/widgets
      
  integration-tests:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.0'
        
    - name: Get dependencies
      run: flutter pub get
      
    - name: Run integration tests
      run: flutter test integration_test
      
  test-reporting:
    runs-on: ubuntu-latest
    needs: [unit-tests, widget-tests, integration-tests]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Upload test results
      uses: dorny/test-reporter@v1
      with:
        name: Test Results
        path: test-results/**/*.xml
        reporter: java-junit
        fail-on-error: false
