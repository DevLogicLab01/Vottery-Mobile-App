name: Flutter CD Enhanced

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  staging-deployment:
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://staging.vottery.com
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.0'
        channel: 'stable'
        
    - name: Install dependencies
      run: flutter pub get
      
    - name: Run tests
      run: flutter test
      
    - name: Setup Android signing
      run: |
        echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/upload-keystore.jks
        echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" > android/key.properties
        echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
        echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties
        echo "storeFile=upload-keystore.jks" >> android/key.properties
      
    - name: Build Android APK (Staging)
      run: flutter build apk --release --flavor staging --dart-define=ENV=staging
      
    - name: Upload to Firebase Distribution
      uses: wzieba/Firebase-Distribution-Github-Action@v1
      with:
        appId: ${{ secrets.FIREBASE_APP_ID_STAGING }}
        serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        groups: testers
        file: build/app/outputs/flutter-apk/app-staging-release.apk
        
    - name: Notify Slack
      uses: 8398a7/action-slack@v3
      with:
        webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        status: ${{ job.status }}
        text: 'Staging deployment complete'
        
  production-deployment:
    runs-on: ubuntu-latest
    needs: staging-deployment
    environment:
      name: production
      url: https://app.vottery.com
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.0'
        
    - name: Install dependencies
      run: flutter pub get
      
    - name: Run smoke tests
      run: flutter test integration_test/
      
    - name: Setup Android signing
      run: |
        echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/upload-keystore.jks
        echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" > android/key.properties
        echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
        echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties
        echo "storeFile=upload-keystore.jks" >> android/key.properties
      
    - name: Build Android App Bundle (Production)
      run: flutter build appbundle --release --flavor production
      
    - name: Upload to Play Store (Staged Rollout)
      uses: r0adkll/upload-google-play@v1
      with:
        serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT }}
        packageName: com.vottery.app
        releaseFiles: build/app/outputs/bundle/productionRelease/app-production-release.aab
        track: production
        status: completed
        inAppUpdatePriority: 5
        userFraction: 0.1
        
    - name: Create GitHub Release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: Release ${{ github.ref }}
        draft: false
        prerelease: false
        
    - name: Post deployment event to Datadog
      uses: DataDog/github-actions@v1
      with:
        api_key: ${{ secrets.DD_API_KEY }}
        events: |
          - title: "Production Deployment"
            text: "Deployed version ${{ github.ref }} to production"
            alert_type: "info"
            tags:
              - "env:production"
              - "service:vottery-mobile"
        
    - name: Notify deployment complete
      uses: 8398a7/action-slack@v3
      with:
        webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        status: ${{ job.status }}
        text: 'Production deployment complete - 10% rollout'
        
  rollback-production:
    runs-on: ubuntu-latest
    environment: production
    if: github.event_name == 'workflow_dispatch'
    
    steps:
    - name: Rollback Play Store
      run: |
        echo "Initiating rollback to previous version"
        # Add rollback logic here
        
    - name: Notify critical alert
      uses: 8398a7/action-slack@v3
      with:
        webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        status: 'warning'
        text: 'CRITICAL: Production rollback initiated'
