name: React Native CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'rn-app/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'rn-app/**'

jobs:
  build-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./rn-app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './rn-app/package-lock.json'

      - name: Install dependencies
        run: npm install

      - name: Run Expo Doctor
        run: npx expo-doctor
        continue-on-error: true

      - name: Type Check (TypeScript)
        run: npx tsc --noEmit

      - name: Lint Analysis
        run: npm run lint
        continue-on-error: true
