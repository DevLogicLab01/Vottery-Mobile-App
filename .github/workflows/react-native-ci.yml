name: React Native CI

on:
  push:
    branches: [ main, develop ]
    paths-ignore:
      - 'flutter_legacy/**'
      - '.github/workflows/flutter-*.yml'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - 'flutter_legacy/**'

jobs:
  build-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run Expo Doctor
        run: npx expo-doctor
        continue-on-error: true

      - name: Type Check (TypeScript)
        run: npx tsc --noEmit

      - name: Lint Analysis
        run: npm run lint
        continue-on-error: true
