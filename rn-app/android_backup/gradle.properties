# Project-wide Gradle settings.

# Specifies the JVM arguments used for the daemon process.
org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m

# AndroidX package structure
android.useAndroidX=true

# Supported architectures
reactNativeArchitectures=armeabi-v7a,arm64-v8a,x86,x86_64

# DISABLING NEW ARCHITECTURE to fix C++ codegen issues in legacy modules
# This is our stability lever.
newArchEnabled=false

# PRO TIP: Enabling Hermes is recommended for better performance.
hermesEnabled=true

# IMMERSIVE UI: Disable edge-to-edge support if it causes layout issues.
edgeToEdgeEnabled=false
